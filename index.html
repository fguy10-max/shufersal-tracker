<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחירוסקופ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
<script>var vConsole = new window.VConsole();</script>
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f8f8;
  --border: #ebebeb;
  --border-dark: #d4d4d4;
  --text: #111111;
  --text2: #666666;
  --text3: #aaaaaa;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --store-a: #1d4ed8;
  --store-b: #15803d;
  --store-c: #b45309;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; overflow-x:hidden; }

/* Splash */
#splash { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.4s; }
#splash.done { opacity:0; pointer-events:none; }
.sp-logo { font-size:2rem; font-weight:900; color:#fff; letter-spacing:-1px; margin-bottom:6px; }
.sp-logo em { color:#4ade80; font-style:normal; }
.sp-sub { color:#555; font-size:0.8rem; margin-bottom:28px; }
.sp-bar { width:180px; height:2px; background:#222; border-radius:2px; overflow:hidden; }
.sp-prog { height:100%; background:#4ade80; border-radius:2px; width:0; transition:width 0.3s ease; }
.sp-msg { margin-top:12px; font-size:0.75rem; color:#444; }

/* Header */
header { height:52px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:16px; position:sticky; top:0; background:rgba(255,255,255,0.95); backdrop-filter:blur(8px); z-index:100; }
.logo { font-size:1.2rem; font-weight:900; color:var(--text); letter-spacing:-0.5px; flex-shrink:0; }
.logo em { color:var(--green); font-style:normal; }
.h-sep { flex:1; }
.h-pill { display:flex; align-items:center; gap:5px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; font-size:0.78rem; color:var(--text2); cursor:pointer; background:var(--bg); transition:all 0.15s; white-space:nowrap; }
.h-pill:hover { border-color:var(--border-dark); color:var(--text); }
.h-pill.active { background:var(--text); color:#fff; border-color:var(--text); }
.badge-count { background:var(--red); color:#fff; font-size:0.65rem; font-weight:700; padding:1px 5px; border-radius:10px; }

/* Layout */
.app { display:grid; grid-template-columns:200px 1fr; height:calc(100vh - 52px); }

/* Sidebar */
.sidebar { border-left:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.sb-label { font-size:0.65rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); padding:12px 16px 6px; }
.cat-item { display:flex; align-items:center; gap:8px; padding:9px 16px; cursor:pointer; border-radius:0; transition:background 0.1s; position:relative; font-size:0.85rem; color:var(--text2); border-right:2px solid transparent; }
.cat-item:hover { background:var(--surface); color:var(--text); }
.cat-item.active { background:var(--blue-light); color:var(--blue); border-right-color:var(--blue); font-weight:600; }
.cat-icon { width:18px; text-align:center; font-size:0.95rem; flex-shrink:0; }
.cat-label { flex:1; }
.cat-count { font-size:0.7rem; color:var(--text3); }
.cat-badge { font-size:0.65rem; font-weight:700; padding:1px 6px; border-radius:8px; }
.cb-deal { background:var(--amber-light); color:var(--amber); }
.cb-cheap { background:var(--green-light); color:var(--green); }

/* Main */
.main { overflow-y:auto; }

/* Top bar */
.topbar { padding:16px 20px 0; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.topbar-title { font-size:1.1rem; font-weight:700; flex:1; }
.filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.fchip { padding:5px 12px; border-radius:20px; font-size:0.78rem; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--text2); transition:all 0.12s; white-space:nowrap; }
.fchip:hover { border-color:var(--border-dark); color:var(--text); }
.fchip.on { background:var(--text); color:#fff; border-color:var(--text); }
.fchip.on-deal { background:var(--amber); color:#fff; border-color:var(--amber); }
.fchip.on-cheap { background:var(--green); color:#fff; border-color:var(--green); }
.fchip.on-watch { background:#7c3aed; color:#fff; border-color:#7c3aed; }

/* Search row */
.search-row { padding:10px 20px; display:flex; gap:8px; align-items:center; }
.search-box { flex:1; position:relative; }
.search-box input { width:100%; padding:8px 14px 8px 34px; border:1px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.88rem; color:var(--text); background:var(--surface); outline:none; transition:border-color 0.15s; }
.search-box input:focus { border-color:var(--border-dark); background:var(--bg); }
.search-box input::placeholder { color:var(--text3); }
.search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:0.85rem; color:var(--text3); pointer-events:none; }
.sort-select { padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.82rem; color:var(--text2); background:var(--surface); outline:none; cursor:pointer; }
.view-toggle { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.view-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--surface); border:none; color:var(--text3); font-size:0.85rem; transition:all 0.12s; }
.view-btn.on { background:var(--text); color:#fff; }

/* Stats strip */
.stats-strip { display:flex; gap:0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin:0 20px 16px; border-radius:8px; overflow:hidden; }
.stat-item { flex:1; padding:10px 14px; text-align:center; border-left:1px solid var(--border); }
.stat-item:last-child { border-left:none; }
.stat-n { font-size:1.2rem; font-weight:700; line-height:1; }
.stat-l { font-size:0.65rem; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

/* Store tags */
.store-tags { display:flex; gap:8px; padding:0 20px 14px; flex-wrap:wrap; }
.store-tag { display:flex; align-items:center; gap:5px; font-size:0.75rem; color:var(--text2); }
.store-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* Results meta */
.results-meta { padding:0 20px 10px; font-size:0.75rem; color:var(--text3); }

/* Grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:1px; background:var(--border); padding:0 20px 20px; }
.grid .card { background:var(--bg); }

/* List */
.list-view { margin:0 20px 20px; display:flex; flex-direction:column; gap:0; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

/* Card — Grid */
.card { background:var(--bg); padding:20px; cursor:pointer; transition:background 0.1s; animation:fadeIn 0.2s ease both; position:relative; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.card:hover { background:var(--surface); }

.card-top { margin-bottom:10px; }
.card-store { font-size:0.7rem; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.card-name { font-size:0.95rem; font-weight:600; line-height:1.35; color:var(--text); margin-bottom:2px; }
.card-brand { font-size:0.78rem; color:var(--text3); margin-bottom:16px; }

.card-price { display:flex; align-items:baseline; gap:6px; margin:10px 0; }
.price-main { font-size:1.75rem; font-weight:700; line-height:1; color:var(--text); }
.price-unit { font-size:0.78rem; color:var(--text3); }
.price-prev { font-size:0.82rem; color:var(--text3); text-decoration:line-through; }

/* Tags under price */
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.tag { font-size:0.68rem; font-weight:600; padding:2px 7px; border-radius:4px; }
.tag-deal { background:var(--amber-light); color:var(--amber); }
.tag-drop { background:var(--blue-light); color:var(--blue); }
.tag-cheap { background:var(--green-light); color:var(--green); }

/* Normalized price */
.norm-price { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--surface); border-radius:6px; margin-bottom:8px; }
.norm-val { font-size:0.78rem; font-weight:600; color:var(--text); }
.norm-lbl { font-size:0.68rem; color:var(--text3); }
.norm-vs { font-size:0.7rem; font-weight:700; padding:2px 6px; border-radius:6px; }
.vs-low { background:var(--green-light); color:var(--green); }
.vs-high { background:var(--red-light); color:var(--red); }

/* Store compare in card */
.store-compare { border-top:1px solid var(--border); padding-top:8px; margin-top:4px; }
.sc-row { display:flex; align-items:center; gap:6px; padding:2px 0; }
.sc-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sc-name { font-size:0.73rem; color:var(--text2); flex:1; }
.sc-price { font-size:0.78rem; font-weight:600; }
.sc-best { color:var(--green); }
.sc-worst { color:var(--red); }
.sc-na { color:var(--text3); font-style:italic; font-weight:400; }
.sc-diff { font-size:0.65rem; color:var(--text3); }

/* Card footer */
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.card-date { font-size:0.68rem; color:var(--text3); }
.card-actions { display:flex; gap:4px; }
.action-btn { padding:3px 8px; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--text2); transition:all 0.12s; }
.action-btn:hover { border-color:var(--border-dark); color:var(--text); }
.action-btn.on-watch { background:#f5f3ff; color:#7c3aed; border-color:#7c3aed; }
.action-btn.on-cart { background:var(--green-light); color:var(--green); border-color:var(--green); }

/* List card */
.list-card { display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; padding:14px 16px; border-bottom:2px solid var(--border); cursor:pointer; transition:background 0.1s; background:var(--bg); }
.list-card:last-child { border-bottom:none; }
.list-card:hover { background:var(--surface); }
.list-view { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

/* Cart drawer */
.drawer-bg { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:500; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.drawer-bg.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; top:0; left:0; bottom:0; width:360px; background:var(--bg); z-index:501; transform:translateX(-100%); transition:transform 0.25s ease; display:flex; flex-direction:column; border-right:1px solid var(--border); }
.drawer.open { transform:translateX(0); }
.drawer-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.drawer-head h2 { font-size:1rem; font-weight:700; }
.drawer-close { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text3); padding:2px; }
.drawer-close:hover { color:var(--text); }
.drawer-body { flex:1; overflow-y:auto; padding:16px; }
.drawer-foot { padding:14px 16px; border-top:1px solid var(--border); }

.cart-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.cart-row:last-child { border-bottom:none; }
.cart-info { flex:1; min-width:0; }
.cart-name { font-size:0.85rem; font-weight:600; line-height:1.3; margin-bottom:2px; }
.cart-store { font-size:0.7rem; color:var(--text3); }
.cart-qty-ctrl { display:flex; align-items:center; gap:6px; margin-top:4px; }
.qty-btn { width:20px; height:20px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:0.85rem; display:flex; align-items:center; justify-content:center; color:var(--text2); }
.qty-num { font-size:0.8rem; font-weight:700; min-width:16px; text-align:center; }
.cart-price { font-weight:700; font-size:0.9rem; white-space:nowrap; }
.cart-del { background:none; border:none; color:var(--text3); cursor:pointer; font-size:0.9rem; padding:2px; }
.cart-del:hover { color:var(--red); }

/* Compare box */
.compare-box { background:var(--surface); border-radius:8px; padding:12px; margin-bottom:12px; }
.compare-box h3 { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:10px; }
.compare-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); }
.compare-row:last-child { border-bottom:none; }
.compare-left { display:flex; align-items:center; gap:7px; }
.compare-name { font-size:0.83rem; font-weight:600; }
.compare-items { font-size:0.68rem; color:var(--text3); }
.compare-items.warn { color:var(--amber); }
.compare-price { font-size:1rem; font-weight:700; }
.compare-price.best { color:var(--green); }
.winner-row { background:var(--green-light); border-radius:6px; padding:8px 12px; display:flex; align-items:center; gap:6px; margin-top:8px; font-size:0.82rem; font-weight:600; color:var(--green); }

/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; opacity:0; pointer-events:none; transition:opacity 0.2s; display:flex; align-items:flex-end; justify-content:center; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal { background:var(--bg); border-radius:16px 16px 0 0; width:100%; max-width:560px; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s ease; padding:20px; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-drag { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-size:1.1rem; font-weight:700; line-height:1.3; margin-bottom:4px; }
.modal-brand { font-size:0.78rem; color:var(--text3); margin-bottom:16px; }
.modal-sec { margin-bottom:16px; }
.modal-sec-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:8px; }
.compare-tbl { width:100%; border-collapse:collapse; }
.compare-tbl th { text-align:right; font-size:0.72rem; color:var(--text3); font-weight:600; padding:6px 8px; border-bottom:2px solid var(--border); }
.compare-tbl td { padding:9px 8px; border-bottom:1px solid var(--border); font-size:0.85rem; }
.compare-tbl tr:last-child td { border-bottom:none; }
.compare-tbl tr.best td { background:var(--green-light); }
.tbl-store { display:flex; align-items:center; gap:6px; font-weight:500; }
.tbl-price { font-weight:700; }
.tbl-best { color:var(--green); }

/* Similar Link inside modal */
.similar-link { background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text2); font-size:0.72rem; font-weight:600; cursor:pointer; padding:5px 12px; transition:all 0.15s; display:inline-flex; align-items:center; gap:4px; }
.similar-link:hover { background:var(--blue-light); color:var(--blue); border-color:var(--blue); }

/* Settings drawer */
.settings-drawer { position:fixed; top:0; right:0; bottom:0; width:300px; background:var(--bg); z-index:502; transform:translateX(100%); transition:transform 0.25s; display:flex; flex-direction:column; border-left:1px solid var(--border); }
.sd-toggle-all { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; }
.sd-toggle-btn { font-size:0.78rem; font-weight:600; color:var(--blue); background:none; border:none; cursor:pointer; }
.sd-toggle-btn:hover { text-decoration:underline; }
/* Store filter */
.store-filter { display:flex; gap:6px; padding:0 20px 12px; flex-wrap:wrap; }
.store-btn { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg); font-size:0.78rem; font-weight:500; cursor:pointer; color:var(--text2); transition:all 0.12s; }
.store-btn:hover { border-color:var(--border-dark); color:var(--text); }
.store-btn.on { color:#fff; border-color:transparent; font-weight:600; }
.settings-drawer.open { transform:translateX(0); }
.sd-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; transition:background 0.1s; }
.sd-item:hover { background:var(--surface); }
.sd-icon { width:20px; text-align:center; }
.sd-label { flex:1; font-size:0.85rem; }
.sd-count { font-size:0.7rem; color:var(--text3); }
.checkbox { width:18px; height:18px; border:1.5px solid var(--border-dark); border-radius:4px; display:flex; align-items:center; justify-content:center; transition:all 0.12s; flex-shrink:0; }
.checkbox.on { background:var(--blue); border-color:var(--blue); }
.checkbox.on::after { content:'✓'; color:#fff; font-size:0.7rem; font-weight:800; }

/* Empty */
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state .ei { font-size:2.5rem; margin-bottom:10px; }

/* Barcode Scanner */
.scan-btn { width:34px; height:34px; border:1px solid var(--border); border-radius:8px; background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--text2); transition:all 0.12s; flex-shrink:0; }
.scan-btn:hover { border-color:var(--border-dark); color:var(--text); }
.scan-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.scanner-modal { position:fixed; inset:0; background:#000; z-index:800; display:none; flex-direction:column; }
.scanner-modal.open { display:flex; }
.scanner-head { padding:16px; display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.8); position:absolute; top:0; left:0; right:0; z-index:1; }
.scanner-title { color:#fff; font-size:0.95rem; font-weight:600; }
.scanner-close { background:none; border:none; color:rgba(255,255,255,0.7); font-size:1.4rem; cursor:pointer; }
.scanner-video { width:100%; height:100%; object-fit:cover; }
.scanner-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.scanner-frame { width:240px; height:160px; border:2px solid #4ade80; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.5); position:relative; }
.scanner-frame::before, .scanner-frame::after { content:''; position:absolute; width:24px; height:24px; border-color:#4ade80; border-style:solid; }
.scanner-frame::before { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 8px 0 0; }
.scanner-frame::after { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 8px; }
.scanner-line { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#4ade80,transparent); animation:scanline 2s linear infinite; }
@keyframes scanline { 0%{top:0} 100%{top:100%} }
.scanner-hint { position:absolute; bottom:100px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.7); font-size:0.82rem; }
.scanner-result { position:absolute; bottom:0; left:0; right:0; background:var(--bg); border-radius:16px 16px 0 0; padding:20px; transform:translateY(100%); transition:transform 0.3s ease; }
.scanner-result.show { transform:translateY(0); }
.scanner-result h3 { font-size:0.9rem; font-weight:700; margin-bottom:12px; }
.scanner-not-found { text-align:center; padding:16px; color:var(--text2); font-size:0.88rem; }

/* Responsive */
@media(max-width:720px){
  .app { grid-template-columns:1fr; }
  .sidebar { position:fixed; bottom:0; left:0; right:0; top:auto; height:auto; border-left:none; border-top:1px solid var(--border); display:flex; overflow-x:auto; overflow-y:hidden; z-index:50; background:var(--bg); padding:4px 0; }
  .cat-item { display:inline-flex; flex-direction:column; border-right:none; border-top:2px solid transparent; padding:5px 10px; font-size:0.72rem; white-space:nowrap; align-items:center; gap:2px; }
  .cat-item.active { border-top-color:var(--blue); border-right:none; background:transparent; }
  .cat-count, .cat-badge { display:none; }
  .sb-label { display:none; }
  .main { padding-bottom:60px; overflow-x:hidden; }
  .grid { grid-template-columns:1fr 1fr; padding:0 10px 80px; gap:0; }
  .list-view { margin:0 10px 80px; }
  .card { padding:14px 12px; }
  .card-name { font-size:0.88rem; }
  .price-main { font-size:1.5rem; }
  header { padding:0 10px; gap:8px; }
  header .h-pill span:not(.badge-count) { display:none; }
  .drawer { width:100%; }
  .settings-drawer { width:100%; }
  .topbar { padding:12px 10px 0; }
  .topbar-title { font-size:1rem; }
  .filter-row { gap:4px; }
  .fchip { padding:4px 10px; font-size:0.74rem; }
  .search-row { padding:8px 10px; }

.chat-msg { display:flex; max-width:85%; }

.chat-bubble {

.chat-chip {

}
.chat-thinking span {
  width:6px; height:6px; background:var(--text3);
  border-radius:50%; animation:chatDot 1.2s infinite;

.chat-thinking span:nth-child(3) { animation-delay:0.4s; }
@keyframes chatDot {
  0%,60%,100% { transform:translateY(0); opacity:0.4; }
  30% { transform:translateY(-4px); opacity:1; }
}
#chat-panel.open { display:flex !important; }
#chat-overlay.open { display:block !important; }
