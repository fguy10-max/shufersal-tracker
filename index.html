<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחירוסקופ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f8f8;
  --border: #ebebeb;
  --border-dark: #d4d4d4;
  --text: #111111;
  --text2: #666666;
  --text3: #aaaaaa;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --store-a: #1d4ed8;
  --store-b: #15803d;
  --store-c: #b45309;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; overflow-x:hidden; }

/* Splash */
#splash { position:fixed; inset:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.4s; }
#splash.done { opacity:0; pointer-events:none; }
.sp-logo { font-size:2rem; font-weight:900; color:#fff; letter-spacing:-1px; margin-bottom:6px; }
.sp-logo em { color:#4ade80; font-style:normal; }
.sp-sub { color:#555; font-size:0.8rem; margin-bottom:28px; }
.sp-bar { width:180px; height:2px; background:#222; border-radius:2px; overflow:hidden; }
.sp-prog { height:100%; background:#4ade80; border-radius:2px; width:0; transition:width 0.3s ease; }
.sp-msg { margin-top:12px; font-size:0.75rem; color:#444; }

/* Header */
header { height:52px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:16px; position:sticky; top:0; background:rgba(255,255,255,0.95); backdrop-filter:blur(8px); z-index:100; }
.logo { font-size:1.2rem; font-weight:900; color:var(--text); letter-spacing:-0.5px; flex-shrink:0; }
.logo em { color:var(--green); font-style:normal; }
.h-sep { flex:1; }
.h-pill { display:flex; align-items:center; gap:5px; padding:5px 12px; border:1px solid var(--border); border-radius:20px; font-size:0.78rem; color:var(--text2); cursor:pointer; background:var(--bg); transition:all 0.15s; white-space:nowrap; }
.h-pill:hover { border-color:var(--border-dark); color:var(--text); }
.h-pill.active { background:var(--text); color:#fff; border-color:var(--text); }
.badge-count { background:var(--red); color:#fff; font-size:0.65rem; font-weight:700; padding:1px 5px; border-radius:10px; }

/* Layout */
.app { display:grid; grid-template-columns:200px 1fr; height:calc(100vh - 52px); }

/* Sidebar */
.sidebar { border-left:1px solid var(--border); overflow-y:auto; padding:12px 0; }
.sb-label { font-size:0.65rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); padding:12px 16px 6px; }
.cat-item { display:flex; align-items:center; gap:8px; padding:9px 16px; cursor:pointer; border-radius:0; transition:background 0.1s; position:relative; font-size:0.85rem; color:var(--text2); border-right:2px solid transparent; }
.cat-item:hover { background:var(--surface); color:var(--text); }
.cat-item.active { background:var(--blue-light); color:var(--blue); border-right-color:var(--blue); font-weight:600; }
.cat-icon { width:18px; text-align:center; font-size:0.95rem; flex-shrink:0; }
.cat-label { flex:1; }
.cat-count { font-size:0.7rem; color:var(--text3); }
.cat-badge { font-size:0.65rem; font-weight:700; padding:1px 6px; border-radius:8px; }
.cb-deal { background:var(--amber-light); color:var(--amber); }
.cb-cheap { background:var(--green-light); color:var(--green); }

/* Main */
.main { overflow-y:auto; }

/* Top bar */
.topbar { padding:16px 20px 0; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.topbar-title { font-size:1.1rem; font-weight:700; flex:1; }
.filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.fchip { padding:5px 12px; border-radius:20px; font-size:0.78rem; font-weight:500; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--text2); transition:all 0.12s; white-space:nowrap; }
.fchip:hover { border-color:var(--border-dark); color:var(--text); }
.fchip.on { background:var(--text); color:#fff; border-color:var(--text); }
.fchip.on-deal { background:var(--amber); color:#fff; border-color:var(--amber); }
.fchip.on-cheap { background:var(--green); color:#fff; border-color:var(--green); }
.fchip.on-watch { background:#7c3aed; color:#fff; border-color:#7c3aed; }

/* Search row */
.search-row { padding:10px 20px; display:flex; gap:8px; align-items:center; }
.search-box { flex:1; position:relative; }
.search-box input { width:100%; padding:8px 14px 8px 34px; border:1px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.88rem; color:var(--text); background:var(--surface); outline:none; transition:border-color 0.15s; }
.search-box input:focus { border-color:var(--border-dark); background:var(--bg); }
.search-box input::placeholder { color:var(--text3); }
.search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:0.85rem; color:var(--text3); pointer-events:none; }
.sort-select { padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.82rem; color:var(--text2); background:var(--surface); outline:none; cursor:pointer; }
.view-toggle { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.view-btn { width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; background:var(--surface); border:none; color:var(--text3); font-size:0.85rem; transition:all 0.12s; }
.view-btn.on { background:var(--text); color:#fff; }

/* Stats strip */
.stats-strip { display:flex; gap:0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin:0 20px 16px; border-radius:8px; overflow:hidden; }
.stat-item { flex:1; padding:10px 14px; text-align:center; border-left:1px solid var(--border); }
.stat-item:last-child { border-left:none; }
.stat-n { font-size:1.2rem; font-weight:700; line-height:1; }
.stat-l { font-size:0.65rem; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:0.5px; }

/* Store tags */
.store-tags { display:flex; gap:8px; padding:0 20px 14px; flex-wrap:wrap; }
.store-tag { display:flex; align-items:center; gap:5px; font-size:0.75rem; color:var(--text2); }
.store-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* Results meta */
.results-meta { padding:0 20px 10px; font-size:0.75rem; color:var(--text3); }

/* Grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:1px; background:var(--border); padding:0 20px 20px; }
.grid .card { background:var(--bg); }

/* List */
.list-view { margin:0 20px 20px; display:flex; flex-direction:column; gap:0; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

/* Card — Grid */
.card { background:var(--bg); padding:20px; cursor:pointer; transition:background 0.1s; animation:fadeIn 0.2s ease both; position:relative; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.card:hover { background:var(--surface); }

.card-top { margin-bottom:10px; }
.card-store { font-size:0.7rem; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:4px; }
.card-name { font-size:0.95rem; font-weight:600; line-height:1.35; color:var(--text); margin-bottom:2px; }
.card-brand { font-size:0.78rem; color:var(--text3); }

.card-price { display:flex; align-items:baseline; gap:6px; margin:10px 0; }
.price-main { font-size:1.75rem; font-weight:700; line-height:1; color:var(--text); }
.price-unit { font-size:0.78rem; color:var(--text3); }
.price-prev { font-size:0.82rem; color:var(--text3); text-decoration:line-through; }

/* Tags under price */
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.tag { font-size:0.68rem; font-weight:600; padding:2px 7px; border-radius:4px; }
.tag-deal { background:var(--amber-light); color:var(--amber); }
.tag-drop { background:var(--blue-light); color:var(--blue); }
.tag-cheap { background:var(--green-light); color:var(--green); }

/* Normalized price */
.norm-price { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--surface); border-radius:6px; margin-bottom:8px; }
.norm-val { font-size:0.78rem; font-weight:600; color:var(--text); }
.norm-lbl { font-size:0.68rem; color:var(--text3); }
.norm-vs { font-size:0.7rem; font-weight:700; padding:2px 6px; border-radius:6px; }
.vs-low { background:var(--green-light); color:var(--green); }
.vs-high { background:var(--red-light); color:var(--red); }

/* Store compare in card */
.store-compare { border-top:1px solid var(--border); padding-top:8px; margin-top:4px; }
.sc-row { display:flex; align-items:center; gap:6px; padding:2px 0; }
.sc-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sc-name { font-size:0.73rem; color:var(--text2); flex:1; }
.sc-price { font-size:0.78rem; font-weight:600; }
.sc-best { color:var(--green); }
.sc-worst { color:var(--red); }
.sc-na { color:var(--text3); font-style:italic; font-weight:400; }
.sc-diff { font-size:0.65rem; color:var(--text3); }

/* Card footer */
.card-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.card-date { font-size:0.68rem; color:var(--text3); }
.card-actions { display:flex; gap:4px; }
.action-btn { padding:3px 8px; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg); color:var(--text2); transition:all 0.12s; }
.action-btn:hover { border-color:var(--border-dark); color:var(--text); }
.action-btn.on-watch { background:#f5f3ff; color:#7c3aed; border-color:#7c3aed; }
.action-btn.on-cart { background:var(--green-light); color:var(--green); border-color:var(--green); }

/* List card */
.list-card { display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; padding:14px 16px; border-bottom:2px solid var(--border); cursor:pointer; transition:background 0.1s; background:var(--bg); }
.list-card:last-child { border-bottom:none; }
.list-card:hover { background:var(--surface); }
.list-view { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

/* Cart drawer */
.drawer-bg { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:500; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.drawer-bg.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; top:0; left:0; bottom:0; width:360px; background:var(--bg); z-index:501; transform:translateX(-100%); transition:transform 0.25s ease; display:flex; flex-direction:column; border-right:1px solid var(--border); }
.drawer.open { transform:translateX(0); }
.drawer-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.drawer-head h2 { font-size:1rem; font-weight:700; }
.drawer-close { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text3); padding:2px; }
.drawer-close:hover { color:var(--text); }
.drawer-body { flex:1; overflow-y:auto; padding:16px; }
.drawer-foot { padding:14px 16px; border-top:1px solid var(--border); }

.cart-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.cart-row:last-child { border-bottom:none; }
.cart-info { flex:1; min-width:0; }
.cart-name { font-size:0.85rem; font-weight:600; line-height:1.3; margin-bottom:2px; }
.cart-store { font-size:0.7rem; color:var(--text3); }
.cart-qty-ctrl { display:flex; align-items:center; gap:6px; margin-top:4px; }
.qty-btn { width:20px; height:20px; border-radius:50%; border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:0.85rem; display:flex; align-items:center; justify-content:center; color:var(--text2); }
.qty-num { font-size:0.8rem; font-weight:700; min-width:16px; text-align:center; }
.cart-price { font-weight:700; font-size:0.9rem; white-space:nowrap; }
.cart-del { background:none; border:none; color:var(--text3); cursor:pointer; font-size:0.9rem; padding:2px; }
.cart-del:hover { color:var(--red); }

/* Compare box */
.compare-box { background:var(--surface); border-radius:8px; padding:12px; margin-bottom:12px; }
.compare-box h3 { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:10px; }
.compare-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); }
.compare-row:last-child { border-bottom:none; }
.compare-left { display:flex; align-items:center; gap:7px; }
.compare-name { font-size:0.83rem; font-weight:600; }
.compare-items { font-size:0.68rem; color:var(--text3); }
.compare-items.warn { color:var(--amber); }
.compare-price { font-size:1rem; font-weight:700; }
.compare-price.best { color:var(--green); }
.winner-row { background:var(--green-light); border-radius:6px; padding:8px 12px; display:flex; align-items:center; gap:6px; margin-top:8px; font-size:0.82rem; font-weight:600; color:var(--green); }

/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; opacity:0; pointer-events:none; transition:opacity 0.2s; display:flex; align-items:flex-end; justify-content:center; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal { background:var(--bg); border-radius:16px 16px 0 0; width:100%; max-width:560px; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.3s ease; padding:20px; }
.modal-bg.open .modal { transform:translateY(0); }
.modal-drag { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal-title { font-size:1.1rem; font-weight:700; line-height:1.3; margin-bottom:4px; }
.modal-brand { font-size:0.78rem; color:var(--text3); margin-bottom:16px; }
.modal-sec { margin-bottom:16px; }
.modal-sec-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text3); margin-bottom:8px; }
.compare-tbl { width:100%; border-collapse:collapse; }
.compare-tbl th { text-align:right; font-size:0.72rem; color:var(--text3); font-weight:600; padding:6px 8px; border-bottom:2px solid var(--border); }
.compare-tbl td { padding:9px 8px; border-bottom:1px solid var(--border); font-size:0.85rem; }
.compare-tbl tr:last-child td { border-bottom:none; }
.compare-tbl tr.best td { background:var(--green-light); }
.tbl-store { display:flex; align-items:center; gap:6px; font-weight:500; }
.tbl-price { font-weight:700; }
.tbl-best { color:var(--green); }

/* Settings drawer */
.settings-drawer { position:fixed; top:0; right:0; bottom:0; width:300px; background:var(--bg); z-index:502; transform:translateX(100%); transition:transform 0.25s; display:flex; flex-direction:column; border-left:1px solid var(--border); }
.sd-toggle-all { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; }
.sd-toggle-btn { font-size:0.78rem; font-weight:600; color:var(--blue); background:none; border:none; cursor:pointer; }
.sd-toggle-btn:hover { text-decoration:underline; }
/* Store filter */
.store-filter { display:flex; gap:6px; padding:0 20px 12px; flex-wrap:wrap; }
.store-btn { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:var(--bg); font-size:0.78rem; font-weight:500; cursor:pointer; color:var(--text2); transition:all 0.12s; }
.store-btn:hover { border-color:var(--border-dark); color:var(--text); }
.store-btn.on { color:#fff; border-color:transparent; font-weight:600; }
.settings-drawer.open { transform:translateX(0); }
.sd-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; transition:background 0.1s; }
.sd-item:hover { background:var(--surface); }
.sd-icon { width:20px; text-align:center; }
.sd-label { flex:1; font-size:0.85rem; }
.sd-count { font-size:0.7rem; color:var(--text3); }
.checkbox { width:18px; height:18px; border:1.5px solid var(--border-dark); border-radius:4px; display:flex; align-items:center; justify-content:center; transition:all 0.12s; flex-shrink:0; }
.checkbox.on { background:var(--blue); border-color:var(--blue); }
.checkbox.on::after { content:'✓'; color:#fff; font-size:0.7rem; font-weight:800; }

/* Empty */
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state .ei { font-size:2.5rem; margin-bottom:10px; }

/* Barcode Scanner */
.scan-btn { width:34px; height:34px; border:1px solid var(--border); border-radius:8px; background:var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; color:var(--text2); transition:all 0.12s; flex-shrink:0; }
.scan-btn:hover { border-color:var(--border-dark); color:var(--text); }
.scan-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.scanner-modal { position:fixed; inset:0; background:#000; z-index:800; display:none; flex-direction:column; }
.scanner-modal.open { display:flex; }
.scanner-head { padding:16px; display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.8); position:absolute; top:0; left:0; right:0; z-index:1; }
.scanner-title { color:#fff; font-size:0.95rem; font-weight:600; }
.scanner-close { background:none; border:none; color:rgba(255,255,255,0.7); font-size:1.4rem; cursor:pointer; }
.scanner-video { width:100%; height:100%; object-fit:cover; }
.scanner-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.scanner-frame { width:240px; height:160px; border:2px solid #4ade80; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.5); position:relative; }
.scanner-frame::before, .scanner-frame::after { content:''; position:absolute; width:24px; height:24px; border-color:#4ade80; border-style:solid; }
.scanner-frame::before { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 8px 0 0; }
.scanner-frame::after { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 8px; }
.scanner-line { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#4ade80,transparent); animation:scanline 2s linear infinite; }
@keyframes scanline { 0%{top:0} 100%{top:100%} }
.scanner-hint { position:absolute; bottom:100px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.7); font-size:0.82rem; }
.scanner-result { position:absolute; bottom:0; left:0; right:0; background:var(--bg); border-radius:16px 16px 0 0; padding:20px; transform:translateY(100%); transition:transform 0.3s ease; }
.scanner-result.show { transform:translateY(0); }
.scanner-result h3 { font-size:0.9rem; font-weight:700; margin-bottom:12px; }
.scanner-not-found { text-align:center; padding:16px; color:var(--text2); font-size:0.88rem; }

/* Responsive */
@media(max-width:720px){
  .app { grid-template-columns:1fr; }
  .sidebar { position:fixed; bottom:0; left:0; right:0; top:auto; height:auto; border-left:none; border-top:1px solid var(--border); display:flex; overflow-x:auto; overflow-y:hidden; z-index:50; background:var(--bg); padding:4px 0; }
  .cat-item { display:inline-flex; flex-direction:column; border-right:none; border-top:2px solid transparent; padding:5px 10px; font-size:0.72rem; white-space:nowrap; align-items:center; gap:2px; }
  .cat-item.active { border-top-color:var(--blue); border-right:none; background:transparent; }
  .cat-count, .cat-badge { display:none; }
  .sb-label { display:none; }
  .main { padding-bottom:60px; overflow-x:hidden; }
  .grid { grid-template-columns:1fr 1fr; padding:0 10px 80px; gap:0; }
  .list-view { margin:0 10px 80px; }
  .card { padding:14px 12px; }
  .card-name { font-size:0.88rem; }
  .price-main { font-size:1.5rem; }
  header { padding:0 10px; gap:8px; }
  header .h-pill span:not(.badge-count) { display:none; }
  .drawer { width:100%; }
  .settings-drawer { width:100%; }
  .topbar { padding:12px 10px 0; }
  .topbar-title { font-size:1rem; }
  .filter-row { gap:4px; }
  .fchip { padding:4px 10px; font-size:0.74rem; }
  .search-row { padding:8px 10px; }
  .store-filter { padding:0 10px 10px; gap:4px; }
  .store-btn { padding:4px 10px; font-size:0.74rem; }
  .results-meta { padding:0 10px 8px; }
  .stats-strip { margin:0 10px 12px; }
  .stat-n { font-size:1rem; }
  .stat-l { font-size:0.6rem; }
  .norm-price { padding:5px 8px; }
  .sc-name { font-size:0.7rem; }
  .sc-price { font-size:0.75rem; }
}
@media(max-width:400px) {
  .grid { grid-template-columns:1fr; }
  .filter-row { overflow-x:auto; flex-wrap:nowrap; padding-bottom:4px; }
}
</style>
</head>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/fguy10-max/shufersal-tracker/main/shufersal_prices.json';

const CAT = {
  dairy:    {i:'🥛',l:'חלב ומוצרי חלב'},
  eggs:     {i:'🥚',l:'ביצים'},
  poultry:  {i:'🍗',l:'עוף'},
  meat:     {i:'🥩',l:'בשר'},
  fish:     {i:'🐟',l:'דגים ופירות ים'},
  produce:  {i:'🥦',l:'ירקות ופירות'},
  bakery:   {i:'🍞',l:'לחם ומאפים'},
  cakes:    {i:'🎂',l:'עוגות ומאפים מתוקים'},
  cookies:  {i:'🍪',l:'עוגיות וקרקרים'},
  chocolate:{i:'🍫',l:'שוקולד'},
  candy:    {i:'🍬',l:'ממתקים'},
  snacks:   {i:'🍿',l:'חטיפים'},
  nuts:     {i:'🥜',l:'אגוזים וגרעינים'},
  beverages:{i:'🧃',l:'משקאות'},
  coffee:   {i:'☕',l:'קפה'},
  tea:      {i:'🍵',l:'תה'},
  condiments:{i:'🫒',l:'שמנים ורטבים'},
  grains:   {i:'🌾',l:'דגנים וקטניות'},
  breakfast:{i:'🥣',l:'ארוחת בוקר'},
  spices:   {i:'🌶️',l:'תבלינים'},
  pantry:   {i:'🥫',l:'שימורים ומזון ארוז'},
  frozen:   {i:'❄️',l:'מוצרים קפואים'},
  alcohol:  {i:'🍺',l:'אלכוהול'},
  hygiene:  {i:'🧴',l:'טיפוח וגהות'},
  cleaning: {i:'🧹',l:'ניקיון הבית'},
  baby:     {i:'👶',l:'תינוקות'},
  pets:     {i:'🐾',l:'חיות מחמד'},
  other:    {i:'📦',l:'אחר'},
};
const SC = { sheli_shabit:'#1d4ed8', express_histadrut:'#15803d', citymarket_givataim:'#b45309' };
const DEFAULT_HIDDEN = ['alcohol','baby','pets','other'];

let DATA, STORES=[], allProducts=[], catMap={}, compMap={};
let curCat='all', curFilter='all', curView='grid';
let watching = new Set(JSON.parse(localStorage.getItem('w')||'[]'));
let cart = JSON.parse(localStorage.getItem('c')||'[]');
let hiddenCats = new Set(JSON.parse(localStorage.getItem('h')||JSON.stringify(DEFAULT_HIDDEN)));

const prog = (p,m) => { document.getElementById('prog').style.width=p+'%'; document.getElementById('splash-msg').textContent=m; };

async function boot() {
  prog(15,'מתחבר...');
  try {
    const r = await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok) throw new Error(r.status);
    prog(55,'מנתח...');
    DATA = await r.json();
  } catch(e) {
    document.getElementById('splash-msg').textContent='❌ '+e.message;
    return;
  }
  prog(85,'בונה...');
  STORES = DATA.stores||[];
  compMap = DATA.comparison?.barcodes||{};
  rebuildProducts();
  prog(100,'');
  setTimeout(()=>{ document.getElementById('splash').classList.add('done'); init(); }, 300);
}

function rebuildProducts() {
  catMap={}; allProducts=[];
  for(const store of STORES) {
    for(const [cat,items] of Object.entries(store.categories||{})) {
      if(hiddenCats.has(cat)) continue;
      if(!catMap[cat]) catMap[cat]=[];
      for(const p of items) {
        const np={...p, _sid:store.id, _sname:store.short};
        if(compMap[p.barcode]) np._prices=compMap[p.barcode].prices;
        // Filter out סיבוס coupons client-side
        if(np.promo && ['סיבוס','SBOX','תו זהב','ח"ע','ח.ע','קופון ח'].some(w => np.promo.includes(w))) {
          np.promo = null; np.promoPrice = null;
        }
        catMap[cat].push(np);
        allProducts.push(np);
      }
    }
  }
}

function init() {
  const d = new Date(DATA.generatedAt);
  // stats
  const total = STORES.reduce((s,st)=>s+st.totalProducts,0);
  const promos = STORES.reduce((s,st)=>s+st.totalWithPromo,0);
  const shared = Object.values(compMap).filter(d=>Object.keys(d.prices).length>=2).length;
  document.getElementById('s-total').textContent = total.toLocaleString();
  document.getElementById('s-promos').textContent = promos;
  document.getElementById('s-compare').textContent = shared.toLocaleString();
  document.getElementById('s-watch').textContent = watching.size;
  // store tags
  // store tags removed
  buildSidebar();
  buildStoreFilter();
  // Default to list view on mobile
  if(window.innerWidth <= 720) {
    curView = 'list';
    document.getElementById('vbtn-grid').classList.remove('on');
    document.getElementById('vbtn-list').classList.add('on');
  }
  render();
  updateBadge();
}

let curStore = 'all';

function buildStoreFilter(){
  const el = document.getElementById('store-filter');
  el.innerHTML = `
    <button class="store-btn on" id="sf-all" onclick="setStore('all')"
      style="background:var(--text);border-color:var(--text)">
      🏠 כל הסניפים
    </button>
    ${STORES.map(s=>`
      <button class="store-btn" id="sf-${s.id}" onclick="setStore('${s.id}')"
        data-color="${SC[s.id]||'#999'}">
        <div style="width:7px;height:7px;border-radius:50%;background:${SC[s.id]||'#999'}"></div>
        ${s.short}
      </button>`).join('')}`;
}

function setStore(storeId){
  curStore = storeId;
  // עדכון כפתורים
  document.querySelectorAll('.store-btn').forEach(b=>b.classList.remove('on'));
  const activeBtn = document.getElementById('sf-'+storeId);
  if(activeBtn){
    activeBtn.classList.add('on');
    if(storeId==='all'){
      activeBtn.style.background='var(--text)';
      activeBtn.style.borderColor='var(--text)';
    } else {
      const col = SC[storeId]||'#999';
      activeBtn.style.background=col;
      activeBtn.style.borderColor=col;
    }
  }
  // reset all buttons bg
  document.querySelectorAll('.store-btn:not(.on)').forEach(b=>{
    b.style.background='var(--bg)';
    b.style.borderColor='var(--border)';
  });
  render();
}

function buildSidebar() {
  const el = document.getElementById('sidebar');
  let h = '<div class="sb-label">קטגוריות</div>';
  h += mkCatItem('all','🏠','הכל',allProducts.length,true);
  for(const [cat,items] of Object.entries(catMap).sort((a,b)=>b[1].length-a[1].length)) {
    const m = CAT[cat]||{i:'📦',l:cat};
    const deals = items.filter(p=>p.promo).length;
    const cheap = items.filter(p=>p.vsAvgPct<-5).length;
    h += mkCatItem(cat, m.i, m.l, items.length, false, deals, cheap);
  }
  el.innerHTML = h;
}

function mkCatItem(id,icon,label,count,active,deals=0,cheap=0) {
  const badge = deals>0 ? `<span class="cat-badge cb-deal">${deals}</span>` :
                cheap>0 ? `<span class="cat-badge cb-cheap">${cheap}</span>` :
                          `<span class="cat-count">${count}</span>`;
  return `<div class="cat-item${active?' active':''}" onclick="selectCat('${id}',this)">
    <span class="cat-icon">${icon}</span>
    <span class="cat-label">${label}</span>${badge}
  </div>`;
}

function selectCat(id,el) {
  curCat=id;
  document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const m = id==='all' ? {i:'',l:'כל המוצרים'} : (CAT[id]||{i:'',l:id});
  document.getElementById('page-title').textContent = m.l;
  document.getElementById('search').value='';
  render();
}

function setFilter(f,btn) {
  curFilter=f;
  document.querySelectorAll('.fchip').forEach(c=>{ c.className='fchip'; });
  btn.classList.add(f==='all'?'on':'on-'+f);
  render();
}

function setView(v) {
  curView=v;
  ['grid','list'].forEach(x=>{ document.getElementById('vbtn-'+x).classList.toggle('on',x===v); });
  render();
}

function getProducts() {
  let list = curCat==='all' ? [...allProducts] : [...(catMap[curCat]||[])];
  // פילטר לפי סניף
  if(curStore!=='all') list = list.filter(p=>p._sid===curStore);
  const q = document.getElementById('search').value.trim().toLowerCase();
  if(q) list = list.filter(p=>p.name.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q));
  if(curFilter==='deal') list=list.filter(p=>p.promo);
  if(curFilter==='cheap') list=list.filter(p=>p.vsAvgPct<-5);
  if(curFilter==='drop') list=list.filter(p=>p.changePct!=null && p.changePct<-3 && p.changePct!==0);
  if(curFilter==='watch') list=list.filter(p=>watching.has(p.barcode));
  const sort = document.getElementById('sort').value;
  if(sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'he'));
  else if(sort==='price_asc') list.sort((a,b)=>a.price-b.price);
  else if(sort==='price_desc') list.sort((a,b)=>b.price-a.price);
  else if(sort==='cheap') list.sort((a,b)=>(a.vsAvgPct??999)-(b.vsAvgPct??999));
  else if(sort==='drop') list.sort((a,b)=>{
    // null = no history, push to bottom
    if(a.changePct==null && b.changePct==null) return 0;
    if(a.changePct==null) return 1;
    if(b.changePct==null) return -1;
    return a.changePct - b.changePct;
  });
  else if(sort==='attractive') {
    const score = p => {
      let s = 0;
      // ירידת מחיר משמעותית (מעל 3%) שלא חזרה לממוצע
      if(p.changePct && p.changePct < -3) {
        const dropScore = Math.abs(p.changePct) * 2;
        // בונוס אם גם זול מממוצע (ירידה אמיתית, לא רק תנודה)
        const avgBonus = (p.vsAvgPct && p.vsAvgPct < 0) ? Math.abs(p.vsAvgPct) : 0;
        s += dropScore + avgBonus;
      }
      // זול מממוצע גם בלי ירידה
      if(p.vsAvgPct && p.vsAvgPct < -5) s += Math.abs(p.vsAvgPct) * 0.5;
      // מבצע אמיתי — ניקוד לפי גודל החיסכון
      if(p.promo && !p.promo.includes('🎫')) {
        const ppA = parsePromoPrice(p.promo, p.price);
        if(ppA?.unitPrice) {
          const savingsPct = Math.round((p.price - ppA.unitPrice) / p.price * 100);
          s += 8 + Math.min(savingsPct * 0.5, 15); // מקסימום 23 נקודות
        } else {
          s += 8;
        }
      }
      // הכי זול בין סניפים (כולל מחיר מבצע)
      if(p._prices && Object.keys(p._prices).length>=2) {
        const vals = Object.values(p._prices);
        const pp = parsePromoPrice(p.promo, p.price);
        const effPrice = pp?.unitPrice ?? p.price;
        const isLowest = effPrice === Math.min(...vals, effPrice);
        if(isLowest && Math.max(...vals) > Math.min(...vals)) s += 8;
      }
      return s;
    };
    list.sort((a,b) => score(b) - score(a));
  }
  else if(sort==='diff') list.sort((a,b)=>{
    const da=a._prices?Math.max(...Object.values(a._prices))-Math.min(...Object.values(a._prices)):0;
    const db=b._prices?Math.max(...Object.values(b._prices))-Math.min(...Object.values(b._prices)):0;
    return db-da;
  });
  return list;
}

function render() {
  const products = getProducts();
  const area = document.getElementById('grid-area');
  const empty = document.getElementById('empty');
  document.getElementById('results-meta').textContent =
    products.length ? `${Math.min(products.length,300).toLocaleString()} מתוך ${products.length.toLocaleString()}` : '';
  if(!products.length) { area.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  const isList = curView==='list';
  area.className = isList ? 'list-view' : 'grid';
  area.innerHTML = products.slice(0,300).map((p,i)=>mkCard(p,i,isList)).join('');
}

function mkCard(p,i,isList) {
  const hasDeal=!!p.promo, hasDrop=p.changePct!=null && p.changePct<-3;
  const pp0 = hasDeal ? parsePromoPrice(p.promo, p.price) : null;
  const effP0 = pp0?.unitPrice ?? p.price;
  const effVsAvg = p.vsAvgPct!=null ? Math.round((effP0/p.price - 1 + p.vsAvgPct/100) * 100) : p.vsAvgPct;
  const isCheap = (p.vsAvgPct!=null && p.vsAvgPct<-5) || (pp0 && effVsAvg < -5);
  const hasCompare=p._prices&&Object.keys(p._prices).length>=2;
  const isW=watching.has(p.barcode), inC=cart.some(c=>c.barcode===p.barcode);
  const delay=`animation-delay:${Math.min(i,15)*0.03}s`;
  const col=SC[p._sid]||'#999';

  const tags = [
    hasDrop ? '<span class="tag tag-drop">📉 ירד</span>' : '',
    hasDeal ? '<span class="tag tag-deal">🔥 מבצע</span>' : '',
    isCheap ? '<span class="tag tag-cheap">💰 זול</span>' : '',
  ].filter(Boolean).join('');

  const p100 = p.pricePer100 ? `
    <div class="norm-price">
      <div>
        <div class="norm-val">₪${p.pricePer100} <span class="norm-lbl">ל-100 ${p.unitType==='ml'?'מ"ל':'גרם'}</span></div>
      </div>
      ${p.vsAvgPct!=null ? `<span class="norm-vs ${p.vsAvgPct<0?'vs-low':'vs-high'}">${p.vsAvgPct<0?'↓':'↑'}${Math.abs(p.vsAvgPct)}%</span>` : ''}
    </div>` : '';

  // השוואת סניפים — כולל סניפים שאין בהם
  const promoData = hasDeal ? parsePromoPrice(p.promo, p.price) : null;

  const storeComp = hasCompare ? `
    <div class="store-compare">
      ${STORES.map(s=>{
        const sp = p._prices[s.id];
        const vals = Object.values(p._prices);
        const minP = Math.min(...vals), maxP = Math.max(...vals);
        const isBest = sp!==undefined && sp===minP;
        const isWorst = sp!==undefined && sp===maxP && minP!==maxP;
        return `<div class="sc-row">
          <div class="sc-dot" style="background:${SC[s.id]}"></div>
          <div class="sc-name">${s.short}</div>
          ${sp!==undefined
            ? `<div class="sc-price ${isBest?'sc-best':isWorst?'sc-worst':''}">₪${sp}</div>
               ${isBest&&minP!==maxP?`<div class="sc-diff">−₪${(maxP-sp).toFixed(1)}</div>`:''}`
            : `<div class="sc-price sc-na">—</div>`}
        </div>`;
      }).join('')}
    </div>` : '';

  const footer = `
    <div class="card-footer">
      <span class="card-date">${p.updatedAt?.substring(0,10)||''}</span>
      <div class="card-actions">
        <button class="action-btn ${isW?'on-watch':''}" onclick="event.stopPropagation();tw('${p.barcode}',this)">${isW?'⭐':'☆'}</button>
        <button class="action-btn ${inC?'on-cart':''}" onclick="event.stopPropagation();tc('${p.barcode}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p._sid}',this)">${inC?'✓':'+'}${inC?' ':' '}רשימה</button>
      </div>
    </div>`;

  if(isList) return `
    <div class="list-card" style="${delay};display:flex;gap:10px;align-items:center" onclick="openProduct('${p.barcode}','${p._sid}')">
      ${productImg(p.barcode, 48)}
      <div style="flex:1;min-width:0">
        <div class="card-store"><div class="sc-dot" style="background:${col};width:6px;height:6px;border-radius:50%;flex-shrink:0"></div><span style="color:${col}">${p._sname}</span></div>
        <div class="card-name">${p.name}</div>
        ${tags ? `<div class="card-tags" style="margin-top:4px">${tags}</div>` : ''}
        ${promoData ? `<div style="background:#fffbeb;border-right:3px solid #f59e0b;padding:5px 8px;border-radius:0 5px 5px 0;font-size:11px;color:#92400e;font-weight:500;margin-top:5px">🔥 ${p.promo}</div>` : ''}
        ${storeComp}
      </div>
      <div style="text-align:left;flex-shrink:0">
        ${promoData ? `
        <div style="font-size:11px;color:var(--text2)">מחיר רגיל</div>
        <div style="font-size:15px;color:var(--text2);font-weight:500;text-decoration:line-through">₪${p.price.toFixed(2)}</div>
        <div style="font-size:11px;color:var(--green);font-weight:500;margin-top:2px">במבצע</div>
        <div class="price-main" style="color:var(--green)">₪${promoData.unitPrice.toFixed(2)}</div>

// Watch & Cart
function tw(bc,btn) {
  if(watching.has(bc)){watching.delete(bc);btn.textContent='☆';btn.classList.remove('on-watch');}
  else{watching.add(bc);btn.textContent='⭐';btn.classList.add('on-watch');}
  localStorage.setItem('w',JSON.stringify([...watching]));
  document.getElementById('s-watch').textContent=watching.size;
}

function tc(bc,name,price,sid,btn) {
  const idx=cart.findIndex(c=>c.barcode===bc);
  if(idx>=0){cart.splice(idx,1);btn.textContent='+ רשימה';btn.classList.remove('on-cart');}
  else{cart.push({barcode:bc,name,price,storeId:sid,qty:1});btn.textContent='✓ רשימה';btn.classList.add('on-cart');}
  saveCart();
}

function saveCart(){localStorage.setItem('c',JSON.stringify(cart));updateBadge();}
function updateBadge(){const b=document.getElementById('cart-badge');b.style.display=cart.length?'inline':'none';b.textContent=cart.length;}

// Cart drawer
function openCart(){renderCart();document.getElementById('cart-bg').classList.add('open');document.getElementById('cart-drawer').classList.add('open');}
function closeCart(){document.getElementById('cart-bg').classList.remove('open');document.getElementById('cart-drawer').classList.remove('open');}

function renderCart() {
  const body=document.getElementById('cart-body'), foot=document.getElementById('cart-foot');
  if(!cart.length){body.innerHTML='<div class="empty-state"><div class="ei">🛒</div><p>הרשימה ריקה</p></div>';foot.innerHTML='';return;}

  body.innerHTML=cart.map((item,idx)=>`
    <div class="cart-row">
      <div class="cart-info">
        <div class="cart-name">${item.name}</div>
        <div class="cart-store">${STORES.find(s=>s.id===item.storeId)?.short||''}</div>
        <div class="cart-qty-ctrl">
          <button class="qty-btn" onclick="chQty(${idx},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="chQty(${idx},1)">+</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="cart-price">₪${(item.price*item.qty).toFixed(2)}</div>
        <button class="cart-del" onclick="rmCart(${idx})">✕</button>
      </div>
    </div>`).join('');

  // השוואת עלות הסל — ללא fallback
  const totalQty=cart.reduce((s,c)=>s+(c.qty||1),0);
  const storeTotals={}, storeFound={}, storeMissing={};
  for(const s of STORES){storeTotals[s.id]=0;storeFound[s.id]=0;storeMissing[s.id]=0;}
  for(const item of cart) {
    const prices=compMap[item.barcode]?.prices||{[item.storeId]:item.price};
    for(const s of STORES) {
      if(prices[s.id]!==undefined){storeTotals[s.id]+=prices[s.id]*(item.qty||1);storeFound[s.id]+=(item.qty||1);}
      else storeMissing[s.id]+=(item.qty||1);
    }
  }
  const myTotal=cart.reduce((s,c)=>s+c.price*(c.qty||1),0);
  const validStores=STORES.filter(s=>storeFound[s.id]>=totalQty/2);
  const bestStore=validStores.length?validStores.reduce((b,s)=>storeTotals[s.id]<storeTotals[b.id]?s:b,validStores[0]):null;

  foot.innerHTML=`
    <div class="compare-box">
      <h3>עלות הסל בסניפים</h3>
      ${STORES.map(s=>{
        const found=storeFound[s.id], missing=storeMissing[s.id];
        const isBest=bestStore&&s.id===bestStore.id;
        return `<div class="compare-row">
          <div class="compare-left">
            <div class="store-dot" style="background:${SC[s.id]}"></div>
            <div>
              <div class="compare-name">${s.short}</div>
              <div class="compare-items ${missing>0?'warn':''}">${found}/${totalQty} פריטים${missing>0?` · ${missing} חסרים`:''}</div>
            </div>
          </div>
          <div class="compare-price ${isBest?'best':''}">₪${storeTotals[s.id].toFixed(2)}</div>
        </div>`;
      }).join('')}
      ${bestStore?`<div class="winner-row">🏆 הכי זול: ${bestStore.short}
        ${validStores.length>1?' · חסכון ₪'+(Math.max(...validStores.map(s=>storeTotals[s.id]))-storeTotals[bestStore.id]).toFixed(2):''}
      </div>`:''}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:var(--text2)">
      <span>${totalQty} פריטים · ₪${myTotal.toFixed(2)}</span>
      <button onclick="cart=[];saveCart();renderCart();render()" style="color:var(--red);background:none;border:none;cursor:pointer;font-size:0.78rem">נקה</button>
    </div>`;
}

function chQty(idx,d){cart[idx].qty=Math.max(1,(cart[idx].qty||1)+d);saveCart();renderCart();}
function rmCart(idx){cart.splice(idx,1);saveCart();renderCart();render();}

  const genStr = genAt ? genAt.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const histDays = DATA.historyDays || 0;
  const totalProds = DATA.stores?.reduce((s,st)=>s+(st.totalProducts||0),0)||0;
  const totalPromos = DATA.stores?.reduce((s,st)=>s+(st.totalWithPromo||0),0)||0;

        <div style="font-weight:600;text-align:left">${genStr}</div>
        <div style="color:var(--text3)">מוצרים</div>
        <div style="font-weight:600;text-align:left">${totalProds.toLocaleString()}</div>
        <div style="color:var(--text3)">מבצעים</div>
        <div style="font-weight:600;text-align:left">${totalPromos.toLocaleString()}</div>
        <div style="color:var(--text3)">ימי היסטוריה</div>
        <div style="font-weight:600;text-align:left">${histDays}</div>
      </div>
      ${DATA.stores?.map(s=>`
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px">
          <div style="width:7px;height:7px;border-radius:50%;background:${SC[s.id]};flex-shrink:0"></div>
          <span style="color:var(--text3);font-size:0.78rem">${s.short}</span>
          <span style="margin-right:auto;font-size:0.78rem">${(s.totalProducts||0).toLocaleString()} מוצרים · ${(s.totalWithPromo||0).toLocaleString()} מבצעים</span>
        </div>`).join('')||''}

    <div class="sd-toggle-all">
      <span style="font-size:0.72rem;color:var(--text3)">קטגוריות</span>
      <button class="sd-toggle-btn" onclick="toggleAllCats()">${allVisible?'הסר הכל':'בחר הכל'}</button>
    </div>`+
    allCatKeys.map(cat=>{
      const m=CAT[cat]||{i:'📦',l:cat};
      const on=!hiddenCats.has(cat);
      const count=catMap[cat]?.length||0;
      return `<div class="sd-item" onclick="toggleCat('${cat}')">
        <span class="sd-icon">${m.i}</span>

function toggleCat(cat){
  if(hiddenCats.has(cat)) hiddenCats.delete(cat);
  else hiddenCats.add(cat);
  const el=document.getElementById('cb-'+cat);
  if(el) el.className='checkbox'+(hiddenCats.has(cat)?'':' on');
  // עדכון כפתור בחר/הסר הכל
  const allCatKeys=Object.keys({...catMap,...Object.fromEntries([...hiddenCats].map(c=>[c,[]]))});
  const allVisible=allCatKeys.every(c=>!hiddenCats.has(c));
  const btn=document.querySelector('.sd-toggle-btn');
  if(btn) btn.textContent=allVisible?'הסר הכל':'בחר הכל';
}

function toggleAllCats(){
  const allCatKeys=Object.keys({...catMap,...Object.fromEntries([...hiddenCats].map(c=>[c,[]]))});
  const allVisible=allCatKeys.every(c=>!hiddenCats.has(c));
  if(allVisible){ allCatKeys.forEach(c=>hiddenCats.add(c)); }
  else { hiddenCats.clear(); }
  buildSettings();
}
function applySettings(){
  localStorage.setItem('h',JSON.stringify([...hiddenCats]));
  rebuildProducts();buildSidebar();closeSettings();render();
}


// ── Barcode Scanner ──────────────────────────────────────
let scannerStream = null;
let scannerInterval = null;

async function openScanner() {
  const modal = document.getElementById('scanner-modal');
  const video = document.getElementById('scanner-video');
  const btn   = document.getElementById('scan-btn');

  // Check support
  if (!('BarcodeDetector' in window)) {
    // Fallback: manual barcode input
    const bc = prompt('הכניסו מספר ברקוד ידנית:');
    if(bc) searchByBarcode(bc.trim());
    return;
  }

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    video.srcObject = scannerStream;
    modal.classList.add('open');
    btn.classList.add('active');

    const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e'] });

    scannerInterval = setInterval(async () => {
      if(video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          const barcodes = await detector.detect(video);
          if(barcodes.length > 0) {
            const bc = barcodes[0].rawValue;
            clearInterval(scannerInterval);
            showScanResult(bc);
          }
        } catch(e) {}
      }
    }, 200);

  } catch(e) {
    alert('לא ניתן לגשת למצלמה. בדקו הרשאות.');
  }
}

function closeScanner() {
  clearInterval(scannerInterval);
  if(scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  document.getElementById('scanner-modal').classList.remove('open');
  document.getElementById('scanner-result').classList.remove('show');
  document.getElementById('scan-btn').classList.remove('active');
}

function showScanResult(barcode) {
  const resultEl = document.getElementById('scanner-result');

  // חיפוש המוצר בכל הסניפים
  const found = [];
  for(const store of STORES) {
    for(const items of Object.values(store.categories||{})) {
      const p = items.find(item => item.barcode === barcode);
      if(p) found.push({...p, _sid:store.id, _sname:store.short});
    }
  }

  // Vibrate if supported
  if(navigator.vibrate) navigator.vibrate(100);

  if(!found.length) {
    resultEl.innerHTML = `
      <h3>ברקוד: ${barcode}</h3>
      <div class="scanner-not-found">
        😕 מוצר לא נמצא במאגר<br>
        <small style="color:var(--text3)">ייתכן שלא קיים בסניפים שלנו</small>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="document.getElementById('scanner-result').classList.remove('show');scannerInterval=setInterval(rescan,200)"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-family:'Heebo',sans-serif;font-size:0.85rem;cursor:pointer">
          סרוק שוב
        </button>
        <button onclick="closeScanner()"
          style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--text);color:#fff;font-family:'Heebo',sans-serif;font-size:0.85rem;cursor:pointer;font-weight:600">
          סגור
        </button>
      </div>`;
  } else {
    const prices = compMap[barcode]?.prices || {};
    const vals = Object.values(prices);
    const minP = vals.length ? Math.min(...vals) : null;

    const storeRows = STORES.map(s => {
      const p = found.find(f => f._sid === s.id);
      const price = prices[s.id] ?? p?.price;
      const pp = p ? parsePromoPrice(p.promo, p.price) : null;
      const effectivePrice = pp?.unitPrice ?? price;
      const isBest = effectivePrice !== undefined && effectivePrice === minP && vals.length > 1;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <div style="width:8px;height:8px;border-radius:50%;background:${SC[s.id]};flex-shrink:0"></div>
        <div style="flex:1;font-size:0.85rem;font-weight:500">${s.short}</div>
        ${price !== undefined
          ? `<div style="text-align:left">
               ${pp?.unitPrice && pp.unitPrice < price
                 ? `<div style="font-size:0.75rem;color:var(--text3);text-decoration:line-through">₪${price.toFixed(2)}</div>
                    <div style="font-size:1rem;font-weight:700;color:var(--green)">₪${pp.unitPrice.toFixed(2)}</div>`
                 : `<div style="font-size:1rem;font-weight:700;color:${isBest?'var(--green)':'var(--text)'}">₪${price.toFixed(2)}</div>`
               }
             </div>
             ${isBest&&vals.length>1?'<div style="font-size:0.7rem;background:var(--green-light);color:var(--green);padding:1px 6px;border-radius:4px;font-weight:600">הכי זול</div>':''}`
          : '<div style="font-size:0.85rem;color:var(--text3);font-style:italic">לא נמצא</div>'}
      </div>`;
    }).join('');

    const mainP = found[0];
    resultEl.innerHTML = `
      <h3>${mainP.name}</h3>
      <div style="font-size:0.78rem;color:var(--text3);margin-bottom:12px">${mainP.brand||''} · ${mainP.unit||''}</div>
      <div style="margin-bottom:14px">${storeRows}</div>
      <div style="display:flex;gap:8px">
        <button onclick="closeScanner();openProduct('${barcode}','${found[0]._sid}')"
          style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-family:'Heebo',sans-serif;font-size:0.85rem;cursor:pointer">
          פרטים נוספים
        </button>
        <button onclick="closeScanner()"
          style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--text);color:#fff;font-family:'Heebo',sans-serif;font-size:0.85rem;cursor:pointer;font-weight:600">
          סגור
        </button>
      </div>`;
  }

  resultEl.classList.add('show');
}

function searchByBarcode(barcode) {
  document.getElementById('search').value = barcode;
  render();
  // scroll to results
  document.getElementById('grid-area').scrollIntoView({behavior:'smooth'});
}


// Parse effective unit price from promo description
function buildSparkline(history, lo, hi) {
  if (!history || history.length < 2) return '';
  const range = hi - lo || 1;
  const W = 280, H = 48, pad = 6;
  const pts = history.map((h, i) => {
    const x = pad + (i / (history.length - 1)) * (W - pad*2);
    const y = H - pad - ((h.p - lo) / range) * (H - pad*2);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  const last = history[history.length-1];
  const currY = H - pad - ((last.p - lo) / range) * (H - pad*2);
  const cx = (pad + (W - pad*2)).toFixed(1);
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:52px;overflow:visible;display:block">' +
    '<polyline points="' + pts + '" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    '<circle cx="' + cx + '" cy="' + currY.toFixed(1) + '" r="3.5" fill="var(--blue)"/>' +
    '<text x="' + pad + '" y="' + H + '" font-size="9" fill="var(--text3)">' + history[0].d.slice(5) + '</text>' +
    '<text x="' + (W-pad) + '" y="' + H + '" font-size="9" fill="var(--text3)" text-anchor="end">' + last.d.slice(5) + '</text>' +
    '</svg>';
}

function productImg(bc, size=64) {
  if(!bc) return '';
  const cdn = `https://d226b0iufwcjmj.cloudfront.net/global/sys/images/${bc}.jpg`;
  const off = bc.length===13
    ? `https://images.openfoodfacts.org/images/products/${bc.slice(0,3)}/${bc.slice(3,6)}/${bc.slice(6,9)}/${bc.slice(9)}/front.400.jpg`
    : '';
  return `<img src="${cdn}" loading="lazy" data-off="${off}"
    onerror="if(this.dataset.t==='1'||!this.dataset.off){this.style.display='none'}else{this.dataset.t='1';this.src=this.dataset.off}"
    style="width:${size}px;height:${size}px;object-fit:contain;border-radius:6px;flex-shrink:0">`;
}

function parsePromoPrice(desc, regularPrice) {
  if (!desc || desc.includes('🎫')) return null;
  if (desc.includes('מעל קניה') || desc.includes('בקניה')) return null;
  let qty = 1, unitPrice = null;

  // Pattern 1: NבPRICE — "2ב22", "3ב18", "קטיף 2ב18"
  let m = desc.match(/(\d+)\s*ב\s*(\d+(?:[.,]\d+)?)/);
  if (m) {
    qty = parseInt(m[1]);
    const total = parseFloat(m[2].replace(',', '.'));
    unitPrice = Math.round(total / qty * 100) / 100;
    if (unitPrice <= 0 || unitPrice >= regularPrice) unitPrice = null;
  }

  // Pattern 2: "ב2- ב 65", "ב2-ב120" — price after SECOND ב
  if (!unitPrice) {
    m = desc.match(/ב\s*\d+\s*[-–]\s*ב\s*(\d+(?:[.,]\d+)?)/);
    if (m) {
      unitPrice = parseFloat(m[1].replace(',', '.'));
      if (unitPrice <= 0 || unitPrice >= regularPrice) unitPrice = null;
    }
  }

  // Pattern 3a: "ב79.90-" — price BEFORE dash
  if (!unitPrice) {
    m = desc.match(/ב(\d+(?:[.,]\d+)?)\s*[-–]/);
    if (m) {
      unitPrice = parseFloat(m[1].replace(',', '.'));
      if (unitPrice <= 0 || unitPrice >= regularPrice) unitPrice = null;
    }
  }

  // Pattern 3b: "ב- 149", "ב. 23.90" — separator then price
  if (!unitPrice) {
    m = desc.match(/ב\s*[-–.]\s*(\d+(?:[.,]\d+)?)/);
    if (m) {
      unitPrice = parseFloat(m[1].replace(',', '.'));
      if (unitPrice <= 0 || unitPrice >= regularPrice) unitPrice = null;
    }
  }

  // Pattern 4: 1+1
  if (!unitPrice && desc.includes('1+1')) {
    unitPrice = Math.round(regularPrice * 50) / 100;
    qty = 2;
  }

  // Pattern 5: standalone price — "קטיף 4.90 בטטות", "15.90 לחם"
  if (!unitPrice) {
    m = desc.match(/(?:^|[\s,])(\d+(?:[.,]\d+)?)(?=\s|$)/);
    if (m) {
      unitPrice = parseFloat(m[1].replace(',', '.'));
      if (unitPrice <= 0 || unitPrice >= regularPrice) unitPrice = null;
    }
  }

  if (!unitPrice) return null;
  const savings = Math.round((regularPrice - unitPrice) / regularPrice * 100);
  return { unitPrice, qty, savings };
}
